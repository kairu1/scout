# cargo-deny policy (ADR-002 §Transitive ceiling and advisory discipline).
# CI runs `cargo deny check` as a hard failure.

[licenses]
allow = [
    "MIT",
    "Apache-2.0",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-DFS-2016",
    "Unicode-3.0",
    "Zlib",
]

[bans]
multiple-versions = "warn"

[advisories]
unmaintained = "workspace"
yanked = "deny"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
