# CI tripwires (ADR-002 §Consequences, binds Pioneers): tests + clippy,
# cargo-audit and cargo-deny as hard failures, the <120 transitive
# ceiling (shipped-target reading, ADR-002 ratified 2026-07-06), and the
# musl cross-compile smoke (reusable musl-build.yml) for both arches.
# Third-party actions are pinned to commit SHAs (supply-chain posture).
name: ci
on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable (toolchain file pins the version)
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - run: cargo test --locked --all-targets
      - run: cargo clippy --all-targets -- -D warnings

  supply-chain:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
      - uses: taiki-e/install-action@4684b8405694ae9dd42c9f39ba901a70ae83f4a3 # v2
        with:
          tool: cargo-audit,cargo-deny
      - run: cargo audit
      - run: cargo deny check
      - name: transitive ceiling (<120 shipped-target crates, ADR-002)
        run: |
          count=$(cargo tree --prefix none | sed 's/ .*//' | sort -u | wc -l)
          echo "transitive crates: $count"
          test "$count" -lt 120

  musl:
    uses: ./.github/workflows/musl-build.yml
