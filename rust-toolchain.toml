# MSRV pin (ADR-002 §MSRV): the toolchain current at Phase 2 engagement.
# Do not chase stable; review on minor bumps of clap/tracing/serde/rusqlite.
[toolchain]
channel = "1.96.1"
components = ["rustfmt", "clippy"]
# musl targets belong to the PINNED toolchain, not to whatever `stable`
# a CI step happens to install — cargo reads this file and auto-adds
# them, so the release/musl builds get a std that exists for the target.
targets = ["x86_64-unknown-linux-musl", "aarch64-unknown-linux-musl"]
